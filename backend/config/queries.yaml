  'list_event': {
    query: 'SELECT n.id, n.title AS name, n.message::jsonb ->> ''descripcion'' AS descripcion, n.message::jsonb ->> ''fecha'' AS fecha, n.message::jsonb ->> ''hora'' AS hora, (n.message::jsonb ->> ''costo'')::numeric AS costo, (n.message::jsonb ->> ''capacidad'')::int AS capacidad, n.message::jsonb ->> ''visibilidad'' AS visibilidad, n.message::jsonb ->> ''lugar'' AS lugar FROM public.notification n JOIN public."user" u ON u.id = n.user_id WHERE u.name = ''system_event_bot'' ORDER BY n.id DESC;',
