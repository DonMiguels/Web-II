services:
  postgres:
    image: postgres:16
    container_name: uni_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - '127.0.0.1:5431:5432'
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:snapshot
    container_name: uni_pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '127.0.0.1:5050:80'
    volumes:
      - ./pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  db_init:
    image: postgres:16
    container_name: uni_db_init
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./init.sql:/init.sql:ro
    command:
      - sh
      - -c
      - |
        psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -f /init.sql
    restart: "no"

  backups:
    image: prodrigestivill/postgres-backup-local:latest
    container_name: uni_pg_backups
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      POSTGRES_CLUSTER: 'TRUE'
      POSTGRES_DB: 'postgres'
      POSTGRES_EXTRA_OPTS: '--clean --if-exists'

      BACKUP_ON_START: 'TRUE'

      BACKUP_KEEP_DAYS: 7
      SCHEDULE: '@daily'
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
